services:
  nanhua-data-service:
    build: .
    container_name: nanhua-data-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "13200:13200"
    healthcheck:
      test: >
        node -e "
          require('http').get('http://localhost:13200', res => {
            let data = '';
            res.on('data', c => data += c);
            res.on('end', () => { if (data == 'Nanhua Data Server is running!') process.exit(0); else process.exit(1); })
          }).on('error', () => process.exit(1));
        "
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s